version: '3.8'

services:
  # Base de datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: fatima-db
    restart: unless-stopped
    env_file: variables.env
    volumes:
      - fatima-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Backend: Directus (Gestor CMS Headless de 0 código)
  directus:
    image: directus/directus:latest
    container_name: fatima-backend
    restart: unless-stopped
    ports:
      - "8055:8055"
    volumes:
      - ./uploads:/directus/uploads
      - ./extensions:/directus/extensions
    depends_on:
      - db
    env_file: variables.env

  # Frontend: Aplicación React SPA servida estáticamente con Nginx
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fatima-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - directus

volumes:
  fatima-data:
